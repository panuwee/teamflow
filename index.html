<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TeamFlow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#EEF2FF 0%,#FDF4FF 50%,#FFF7ED 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* Login */
#login-screen{background:#fff;border-radius:20px;padding:40px 32px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.12);}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:2px solid #E5E7EB;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:600;color:#374151;cursor:pointer;transition:all .15s;margin-bottom:12px;}
.google-btn:hover{border-color:#6366F1;background:#EEF2FF;}
#login-error{margin-top:12px;font-size:13px;color:#DC2626;background:#FEF2F2;border-radius:8px;padding:10px;display:none;}

/* App */
#app{display:none;width:100%;min-height:100vh;flex-direction:column;}
body.app-mode{display:block;align-items:unset;justify-content:unset;}
#header{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);gap:10px;flex-wrap:wrap;}
#logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;color:#111827;}
.view-btn{border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;background:#F3F4F6;color:#374151;}
.view-btn.active{background:#6366F1;color:#fff;}
#btn-new{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(99,102,241,.4);}
#sync-status{font-size:11px;color:#9CA3AF;display:flex;align-items:center;gap:4px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#9CA3AF;}
.dot.ok{background:#4ADE80;}.dot.syncing{background:#FB923C;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#dashboard{display:grid;grid-template-columns:1fr auto;gap:16px;margin-bottom:20px;}
.dash-card{background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.stat-box{text-align:center;padding:4px 10px;}
.stat-num{font-size:20px;font-weight:800;}
.stat-label{font-size:10px;color:#9CA3AF;font-weight:600;white-space:nowrap;}
#filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
#filters select{border:1px solid #E5E7EB;border-radius:8px;padding:6px 12px;font-size:13px;color:#374151;background:#fff;}
#btn-clear{background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;display:none;}
#kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.col{border-radius:16px;padding:14px;min-height:200px;border:2px solid transparent;transition:background .15s,border .15s;}
.col.drag-over{border:2px dashed #818CF8!important;background:rgba(99,102,241,.06)!important;}
.col-header{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-title{font-weight:700;font-size:13px;}
.col-count{margin-left:auto;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;background:rgba(0,0,0,.07);}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;border-left:4px solid #ccc;transition:transform .15s,box-shadow .15s;user-select:none;}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.11);}
.card-title{font-size:13px;font-weight:600;color:#111827;line-height:1.4;}
.card-project{font-size:11px;color:#9CA3AF;margin-top:4px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.badge{border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;}
#list-view{display:flex;flex-direction:column;gap:16px;}
.list-group{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.list-hdr{padding:12px 20px;color:#fff;font-weight:700;font-size:14px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;font-size:11px;font-weight:700;color:#9CA3AF;text-align:left;border-bottom:1px solid #E5E7EB;background:#F9FAFB;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #F3F4F6;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F9FAFB;cursor:pointer;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h2{font-size:18px;font-weight:700;color:#111827;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:#6B7280;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;color:#111827;}
.field textarea{resize:vertical;}
.btn-p{background:#6366F1;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-s{background:#F3F4F6;color:#374151;border:none;border-radius:8px;padding:9px 20px;font-size:14px;cursor:pointer;}
.btn-d{background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:7px 18px;font-size:13px;cursor:pointer;}
.cb{display:flex;gap:8px;margin-bottom:10px;}
.cb-body{background:#F9FAFB;border-radius:10px;padding:8px 12px;flex:1;}
.spinner{width:32px;height:32px;border:3px solid #E5E7EB;border-top-color:#6366F1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN SCREEN — shows immediately, pure HTML, no JS needed -->
<div id="login-screen">
  <div style="font-size:48px;margin-bottom:12px;">🎯</div>
  <h2 style="font-size:22px;font-weight:800;color:#111827;margin-bottom:8px;">TeamFlow</h2>
  <p style="font-size:13px;color:#6B7280;margin-bottom:4px;">เข้าสู่ระบบด้วย Garena Google Account</p>
  <p style="font-size:12px;color:#9CA3AF;margin-bottom:28px;">เฉพาะสมาชิกทีมที่ได้รับสิทธิ์เท่านั้น</p>
  <button class="google-btn" id="google-btn" onclick="loginWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Login with Google
  </button>
  <div id="login-status" style="font-size:12px;color:#9CA3AF;display:none;">⏳ กำลังโหลด Supabase…</div>
  <div id="login-error"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="header">
    <div id="logo"><span>🎯</span> TeamFlow</div>
    <div style="display:flex;gap:6px;">
      <button class="view-btn active" id="btn-kanban" onclick="setView('kanban')">⊞ Kanban</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">☰ List</button>
    </div>

      <div id="sync-status"><span class="dot ok" id="sync-dot"></span><span id="sync-text">Synced</span></div>
      <div id="online-avatars" style="display:flex;align-items:center;gap:4px;"></div>
      <div id="readonly-badge" style="display:none;background:#FEF9C3;color:#CA8A04;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;">👁️ View Only</div>
      <button onclick="openMembers()" id="btn-members" style="background:#F3F4F6;color:#374151;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;">👥 Team</button>
      <button onclick="openProjects()" id="btn-projects" style="background:#F3F4F6;color:#374151;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;">📁 Projects</button>
      <button id="btn-new" onclick="openNew()">+ New Task</button>
      <button onclick="logout()" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;">🚪 Logout</button>
    </div>
  </div>
  <div style="padding:20px 24px;">
    <div id="dashboard"><div class="dash-card" id="dash-progress"></div><div class="dash-card" id="dash-counts"></div></div>
    <div id="filters">
      <select id="f-assignee" onchange="applyFilter()"><option>All Assignees</option></select>
      <select id="f-priority" onchange="applyFilter()"><option>All Priorities</option><option>High</option><option>Medium</option><option>Low</option></select>
      <select id="f-project" onchange="applyFilter()"><option>All Projects</option></select>
      <button id="btn-clear" onclick="clearFilter()">✕ Clear</button>

    <div id="list-view" style="display:none;"></div>

</div>

<!-- Modals -->
<div class="overlay" id="modal-detail" onclick="if(event.target===this)closeModal('modal-detail')">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div id="detail-title-wrap" style="flex:1;"></div>
      <button onclick="closeModal('modal-detail')" style="background:none;border:none;font-size:22px;color:#9CA3AF;">×</button>
    </div>
    <div id="detail-badges" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div><div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Assignee</div><div id="detail-assignee"></div></div>
      <div><div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Due Date</div><div id="detail-due" style="font-size:13px;color:#374151;"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div><div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;margin-bottom:4px;">📌 PIC</div><div id="detail-pic"></div></div>
      <div><div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Project</div><div id="detail-project" style="font-size:13px;color:#374151;"></div></div>
    </div>
    <div style="margin-bottom:16px;"><div style="font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;margin-bottom:4px;">Description</div><div id="detail-desc" style="font-size:13px;color:#6B7280;line-height:1.6;"></div></div>
    <div id="detail-actions" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;"></div>
    <div style="font-size:13px;font-weight:700;color:#111827;margin-bottom:10px;" id="comment-header">💬 Comments</div>
    <div id="detail-comments"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <input id="comment-input" placeholder="Add a comment…" style="flex:1;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;" onkeydown="if(event.key==='Enter')postComment()"/>
      <button class="btn-p" onclick="postComment()" style="padding:8px 14px;font-size:13px;">Post</button>

</div>

<div class="overlay" id="modal-task" onclick="if(event.target===this)closeModal('modal-task')">
  <div class="modal">
    <h2 id="task-modal-title">➕ New Task</h2>
    <div class="field"><label>Title *</label><input id="tf-title" placeholder="Task title"/></div>
    <div class="field"><label>Project</label><select id="tf-project"></select></div>
    <div class="field"><label>Status</label><select id="tf-status"><option>To Do</option><option>In Progress</option><option>Review</option><option>Done</option></select></div>

    <div class="field"><label>Description</label><textarea id="tf-desc" rows="3"></textarea></div>
    <div style="display:flex;gap:8px;"><button class="btn-p" onclick="submitTask()" style="flex:1;">Save Task</button><button class="btn-s" onclick="closeModal('modal-task')">Cancel</button></div>
  </div>
</div>

<div class="overlay" id="modal-members" onclick="if(event.target===this)closeModal('modal-members')">
  <div class="modal">
    <h2>👥 Team Members</h2>
    <div id="members-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <input id="new-member-input" placeholder="New member name…" style="flex:1;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;" onkeydown="if(event.key==='Enter')addMemberInline()"/>
      <button class="btn-p" onclick="addMemberInline()" style="padding:8px 16px;">Add</button>
    </div>
    <div style="display:flex;gap:8px;"><button onclick="saveMembers()" style="flex:1;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;">Save</button><button class="btn-s" onclick="closeModal('modal-members')">Cancel</button></div>
  </div>
</div>

<div class="overlay" id="modal-projects" onclick="if(event.target===this)closeModal('modal-projects')">
  <div class="modal">
    <h2>📁 Projects</h2>
    <div id="projects-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <input id="new-project-input" placeholder="New project name…" style="flex:1;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;" onkeydown="if(event.key==='Enter')addProjectInline()"/>
      <button class="btn-p" onclick="addProjectInline()" style="padding:8px 16px;">Add</button>
    </div>
    <div style="display:flex;gap:8px;"><button onclick="saveProjects()" style="flex:1;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;">Save</button><button class="btn-s" onclick="closeModal('modal-projects')">Cancel</button></div>
  </div>
</div>

<script>
const WHITELIST={
  'panuwee.w@garena.com':'Panu','nithidol.k@garena.com':'Big',
  'tanadech.s@garena.com':'Mark','sakdarin@garena.com':'Po',
  'fco.thanayoot@garena.com':'Aof','fco.koravit@garena.com':'Folk',
  'weerayut@garena.com':"P'Mac",'kwanchanok.s@garena.com':'May',
  'napol.a@garena.com':'Pluem','chayodom.a@garena.com':'No',
  'sasin.cha@garena.com':'Gear','fco.rittichai@garena.com':'Boss',
  'fco.thanatbhum@garena.com':'Magnate','fco.punyakon@garena.com':'Real'
};
const STATUSES=['To Do','In Progress','Review','Done'];
const SC={'To Do':{bg:'#EEF2FF',border:'#818CF8',text:'#4F46E5',dot:'#818CF8'},'In Progress':{bg:'#FFF7ED',border:'#FB923C',text:'#EA580C',dot:'#FB923C'},Review:{bg:'#FDF4FF',border:'#C084FC',text:'#9333EA',dot:'#C084FC'},Done:{bg:'#F0FDF4',border:'#4ADE80',text:'#16A34A',dot:'#4ADE80'}};
const PC={High:{bg:'#FEE2E2',text:'#DC2626'},Medium:{bg:'#FEF9C3',text:'#CA8A04'},Low:{bg:'#DCFCE7',text:'#16A34A'}};
const AV=['#6366F1','#EC4899','#F59E0B','#10B981','#3B82F6','#EF4444','#8B5CF6','#14B8A6'];
const PRC=['#6366F1','#EC4899','#F59E0B','#10B981','#3B82F6','#8B5CF6','#14B8A6','#EF4444'];

let db,tasks=[],members=[],projects=[],view='kanban';
let editingId=null,selectedId=null,draggingId=null,pendingMembers=[],pendingProjects=[];
let fA='All Assignees',fP='All Priorities',fPr='All Projects';
let currentUser=null,isReadOnly=false,presenceChannel=null,onlineUsers={};

// ── Load Supabase with multiple CDN fallbacks ─────────────────────────────────
function loadSupabase(cdns, i, cb) {
  if(i>=cdns.length){ cb(new Error('All CDNs failed')); return; }
  var s=document.createElement('script');
  s.src=cdns[i];
  s.onload=function(){ cb(null); };
  s.onerror=function(){ loadSupabase(cdns,i+1,cb); };
  document.head.appendChild(s);
}

loadSupabase([
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js',
  'https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js',
], 0, function(err) {
  if(err) {
    document.getElementById('login-error').textContent='❌ โหลด Supabase ไม่ได้ กรุณาเช็ค Internet';
    document.getElementById('login-error').style.display='';
    document.getElementById('google-btn').disabled=true;
    return;
  }
  db = supabase.createClient(
    'https://hdruqpgbbnvuawbbztfn.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkcnVxcGdiYm52dWF3YmJ6dGZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mjk3OTQsImV4cCI6MjA5MzEwNTc5NH0.4_6mJgWQvbB8N8iTawqFm-LXs5IF_j8OzZstriQ7GFM'
  );
  initAuth();
});

// ── AUTH ──────────────────────────────────────────────────────────────────────
function initAuth() {
  // Listen for auth state changes (handles OAuth redirect)
  db.auth.onAuthStateChange(function(event, session) {
    if((event==='SIGNED_IN'||event==='TOKEN_REFRESHED') && session && !currentUser) {
      bootApp(session);
    }
    if(event==='SIGNED_OUT') { currentUser=null; showLogin(); }
  });
  // Check existing session
  db.auth.getSession().then(function(res) {
    var session = res.data && res.data.session;
    if(session && !currentUser) bootApp(session);
  });
}

function loginWithGoogle() {
  if(!db){ alert('กรุณารอสักครู่ กำลังโหลด…'); return; }
  document.getElementById('google-btn').textContent='⏳ กำลัง redirect…';
  db.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo:'https://panuwee.github.io/teamflow/', queryParams:{hd:'garena.com'} }
  }).then(function(res){
    if(res.error) showError(res.error.message);
  });
}

async function logout() {
  if(!confirm('ต้องการ Logout ไหมครับ?')) return;
  if(presenceChannel) presenceChannel.unsubscribe();
  await db.auth.signOut();
}

async function bootApp(session) {
  const email = session.user.email.toLowerCase();
  if(WHITELIST[email]) {
    currentUser = WHITELIST[email];
    isReadOnly = false;
  } else {
    // ไม่อยู่ใน Whitelist → อ่านได้อย่างเดียว
    const nameFromEmail = email.split('@')[0];
    currentUser = nameFromEmail.charAt(0).toUpperCase() + nameFromEmail.slice(1);
    isReadOnly = true;
  }
  try {
    await loadAll();
    if(!isReadOnly && !members.includes(currentUser)) {
      await upsertMember(currentUser);
      members.push(currentUser);
    }
    showApp();
    render(); setView('kanban');
    initPresence();
  } catch(e) {
    showError('โหลดข้อมูลไม่ได้: '+e.message);
  }
}

function showLogin() {
  document.getElementById('login-screen').style.display='';
  document.getElementById('app').style.display='none';
  document.body.classList.remove('app-mode');
  document.getElementById('google-btn').textContent='Login with Google';
}
function showApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.body.classList.add('app-mode');
  // ซ่อน/แสดงปุ่มตาม permission
  const ro = isReadOnly;
  document.getElementById('btn-new').style.display = ro ? 'none' : '';
  document.getElementById('btn-members').style.display = ro ? 'none' : '';
  document.getElementById('btn-projects').style.display = ro ? 'none' : '';
  document.getElementById('readonly-badge').style.display = ro ? '' : 'none';
}
function showError(msg) {
  var el=document.getElementById('login-error');
  el.textContent='❌ '+msg; el.style.display='';
}

// ── DATA ──────────────────────────────────────────────────────────────────────
async function loadAll(){
  setSyncing(true);
  const [{data:td,error:te},{data:md,error:me}]=await Promise.all([
    db.from('tasks').select('*').order('updated_at',{ascending:true}),
    db.from('members').select('*').order('id',{ascending:true}),
  ]);
  if(te) throw te; if(me) throw me;
  tasks=(td||[]).map(t=>({...t,comments:t.comments||[]}));
  members=(md||[]).map(m=>m.name);
  const ps={};tasks.forEach(t=>{if(t.project) ps[t.project]=1;});
  projects=Object.keys(ps);
  if(!projects.length) projects=['Operation','Design'];
  setSyncing(false,'Synced');
}
async function upsertTask(t){
  setSyncing(true,'Saving…');
  await db.from('tasks').upsert({...t,updated_at:new Date().toISOString()});
  setSyncing(false,'Saved ✓');
  setTimeout(()=>setSyncing(false,'Synced'),2000);
}
async function deleteTaskDB(id){ await db.from('tasks').delete().eq('id',id); }
async function upsertMember(name){ await db.from('members').upsert({name},{onConflict:'name'}); }
async function deleteMemberDB(name){ await db.from('members').delete().eq('name',name); }

setInterval(async()=>{ if(document.hidden||!currentUser) return; await loadAll(); render(); },30000);

// ── PRESENCE ──────────────────────────────────────────────────────────────────
function initPresence(){
  // แสดงชื่อตัวเองทันทีก่อน
  onlineUsers[currentUser]=true;
  renderOnline();

  if(presenceChannel) presenceChannel.unsubscribe();
  presenceChannel=db.channel('online-users',{config:{presence:{key:currentUser}}});
  presenceChannel
    .on('presence',{event:'sync'},()=>{
      const s=presenceChannel.presenceState(); onlineUsers={};
      Object.keys(s).forEach(k=>{onlineUsers[k]=true;}); renderOnline();
    })
    .on('presence',{event:'join'},({key})=>{onlineUsers[key]=true;renderOnline();})
    .on('presence',{event:'leave'},({key})=>{delete onlineUsers[key];renderOnline();})
    .subscribe(async s=>{ if(s==='SUBSCRIBED') await presenceChannel.track({user:currentUser}); });
}
function renderOnline(){
  const ol=Object.keys(onlineUsers);
  document.getElementById('online-avatars').innerHTML=
    `<span style="font-size:11px;color:#9CA3AF;">🟢${ol.length}</span>`+
    `<div style="display:flex;">${ol.map((u,i)=>`<div title="${u}" style="margin-left:${i>0?'-8px':'0'};z-index:${10-i};position:relative;">${av(u,28)}</div>`).join('')}</div>`+
    `<span style="font-size:11px;color:#6366F1;font-weight:600;background:#EEF2FF;padding:3px 8px;border-radius:20px;">${currentUser}</span>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setSyncing(on,msg=''){
  document.getElementById('sync-dot').className='dot '+(on?'syncing':'ok');
  document.getElementById('sync-text').textContent=msg||(on?'Syncing…':'Synced');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
function av(name,size=28){
  const i=name?name.charCodeAt(0)%AV.length:0;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${AV[i]};font-size:${Math.round(size*.38)}px;">${name?name[0].toUpperCase():'?'}</div>`;
}
function ring(pct,color,size=44){
  const r=(size-6)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E5E7EB" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${d} ${c-d}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" font-size="10" font-weight="700" fill="${color}">${pct}%</text></svg>`;
}
function filtered(){ return tasks.filter(t=>(fA==='All Assignees'||t.assignee===fA)&&(fP==='All Priorities'||t.priority===fP)&&(fPr==='All Projects'||t.project===fPr)); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){ renderDash(); renderFilters(); renderKanban(); renderList(); }

function renderDash(){
  const done=tasks.filter(t=>t.status==='Done').length,total=tasks.length,pct=total?Math.round(done/total*100):0;
  const rings=projects.map((p,i)=>{const pt=tasks.filter(t=>t.project===p),pp=pt.length?Math.round(pt.filter(t=>t.status==='Done').length/pt.length*100):0;return`<div style="display:flex;align-items:center;gap:8px;">${ring(pp,PRC[i%PRC.length],40)}<span style="font-size:12px;color:#6B7280;font-weight:600;">${p}</span></div>`;}).join('');
  document.getElementById('dash-progress').innerHTML=`<div style="display:flex;align-items:center;gap:12px;">${ring(pct,'#6366F1',52)}<div><div style="font-size:11px;color:#9CA3AF;font-weight:600;">OVERALL PROGRESS</div><div style="font-size:16px;font-weight:800;color:#111827;">${done}/${total} Done</div></div></div><div style="width:1px;height:40px;background:#E5E7EB;flex-shrink:0;"></div><div style="display:flex;gap:20px;flex-wrap:wrap;">${rings}</div>`;
  document.getElementById('dash-counts').innerHTML=STATUSES.map(s=>`<div class="stat-box"><div class="stat-num" style="color:${SC[s].text};">${tasks.filter(t=>t.status===s).length}</div><div class="stat-label">${s}</div></div>`).join('');
}

function renderFilters(){
  const fa=document.getElementById('f-assignee'),fp=document.getElementById('f-project');
  const va=fa.value,vp=fp.value;
  fa.innerHTML='<option>All Assignees</option>'+members.map(m=>`<option>${m}</option>`).join('');
  fp.innerHTML='<option>All Projects</option>'+projects.map(p=>`<option>${p}</option>`).join('');
  fa.value=va;fp.value=vp;
}
function applyFilter(){
  fA=document.getElementById('f-assignee').value;
  fP=document.getElementById('f-priority').value;
  fPr=document.getElementById('f-project').value;
  document.getElementById('btn-clear').style.display=(fA!=='All Assignees'||fP!=='All Priorities'||fPr!=='All Projects')?'':'none';
  renderKanban();renderList();
}
function clearFilter(){
  fA='All Assignees';fP='All Priorities';fPr='All Projects';
  document.getElementById('f-assignee').value=fA;
  document.getElementById('f-priority').value=fP;
  document.getElementById('f-project').value=fPr;
  document.getElementById('btn-clear').style.display='none';
  renderKanban();renderList();
}

function cardHTML(t){
  const s=SC[t.status]||SC['To Do'],p=PC[t.priority]||PC.Medium;
  const today=new Date().toISOString().slice(0,10),ov=t.due&&t.due<today&&t.status!=='Done';
  return `<div class="card" draggable="true" style="border-left-color:${s.border};" ondragstart="draggingId='${t.id}'" onclick="openDetail('${t.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;"><span class="card-title">${t.title}</span><span class="badge" style="background:${p.bg};color:${p.text};">${t.priority}</span></div>
    <div class="card-project">${t.project}</div>
    <div class="card-footer"><div style="display:flex;align-items:center;gap:5px;">${av(t.assignee,22)}<span style="font-size:11px;color:#6B7280;">${t.assignee}</span></div>
    <div style="display:flex;align-items:center;gap:6px;">${t.comments?.length?`<span style="font-size:11px;color:#9CA3AF;">💬${t.comments.length}</span>`:''}${t.due?`<span style="font-size:11px;color:${ov?'#EF4444':'#9CA3AF'};font-weight:${ov?700:400};">${ov?'⚠️ ':'📅 '}${t.due}</span>`:''}</div></div></div>`;
}

function renderKanban(){
  document.getElementById('kanban').innerHTML=STATUSES.map(status=>{
    const s=SC[status],col=filtered().filter(t=>t.status===status);
    return `<div class="col" style="background:${s.bg};" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="dropCard('${status}',this)">
      <div class="col-header"><div class="col-dot" style="background:${s.dot};"></div><span class="col-title" style="color:${s.text};">${status}</span><span class="col-count" style="color:${s.text};">${col.length}</span></div>
      ${col.map(cardHTML).join('')}</div>`;
  }).join('');
}

function renderList(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('list-view').innerHTML=projects.map((proj,pi)=>{
    const pt=filtered().filter(t=>t.project===proj);
    if(!pt.length) return '';
    return `<div class="list-group"><div class="list-hdr" style="background:linear-gradient(90deg,${PRC[pi%PRC.length]},${PRC[(pi+1)%PRC.length]});">${proj} <span style="opacity:.8;font-size:12px;">${pt.length} tasks</span></div>
    <table><thead><tr><th>TASK</th><th>STATUS</th><th>PRIORITY</th><th>ASSIGNEE</th><th>DUE</th><th>COMMENTS</th></tr></thead><tbody>
    ${pt.map(t=>{const s=SC[t.status]||SC['To Do'],p=PC[t.priority]||PC.Medium,ov=t.due&&t.due<today&&t.status!=='Done';
    return`<tr onclick="openDetail('${t.id}')"><td style="font-weight:600;color:#111827;">${t.title}</td><td><span class="badge" style="background:${s.bg};color:${s.text};">${t.status}</span></td><td><span class="badge" style="background:${p.bg};color:${p.text};">${t.priority}</span></td><td><div style="display:flex;align-items:center;gap:6px;">${av(t.assignee,22)}<span>${t.assignee}</span></div></td><td style="color:${ov?'#EF4444':'#9CA3AF'};font-weight:${ov?700:400};">${ov?'⚠️ ':''}${t.due||'—'}</td><td style="color:#9CA3AF;">${t.comments?.length?'💬 '+t.comments.length:'—'}</td></tr>`;}).join('')}
    </tbody></table></div>`;
  }).join('');
}

function setView(v){
  view=v;
  document.getElementById('kanban').style.display=v==='kanban'?'grid':'none';
  document.getElementById('list-view').style.display=v==='list'?'flex':'none';
  document.getElementById('btn-kanban').className='view-btn'+(v==='kanban'?' active':'');
  document.getElementById('btn-list').className='view-btn'+(v==='list'?' active':'');
}

async function dropCard(status,col){
  col.classList.remove('drag-over');
  if(!draggingId||isReadOnly) return;
  const t=tasks.find(x=>x.id==draggingId);
  if(t&&t.status!==status){t.status=status;render();await upsertTask(t);}
  draggingId=null;
}

function openDetail(id){
  selectedId=id;
  const t=tasks.find(x=>x.id==id);if(!t) return;
  renderDetail(t);openModal('modal-detail');
}
function renderDetail(t){
  const s=SC[t.status]||SC['To Do'],p=PC[t.priority]||PC.Medium;
  document.getElementById('detail-title-wrap').innerHTML=`<h2 style="margin:0;font-size:18px;font-weight:700;color:#111827;">${t.title}</h2>`;
  document.getElementById('detail-badges').innerHTML=`<span class="badge" style="background:${s.bg};color:${s.text};border:1px solid ${s.border};">${t.status}</span><span class="badge" style="background:${p.bg};color:${p.text};">${t.priority}</span><span class="badge" style="background:#F3F4F6;color:#374151;">${t.project}</span>`;
  document.getElementById('detail-assignee').innerHTML=`<div style="display:flex;align-items:center;gap:6px;">${av(t.assignee,24)}<span style="font-size:13px;color:#374151;">${t.assignee}</span></div>`;
  document.getElementById('detail-due').textContent=t.due||'—';
  document.getElementById('detail-pic').innerHTML=t.created_by?`<div style="display:flex;align-items:center;gap:6px;">${av(t.created_by,24)}<span style="font-size:13px;color:#374151;">${t.created_by}</span></div>`:`<span style="font-size:13px;color:#9CA3AF;">—</span>`;
  document.getElementById('detail-project').textContent=t.project||'—';
  document.getElementById('comment-header').textContent=`💬 Comments (${(t.comments||[]).length})`;
  // ซ่อนปุ่ม Edit/Delete ถ้าเป็น read-only
  document.getElementById('detail-actions').innerHTML = isReadOnly ? '' :
    `<button class="btn-s" style="font-size:13px;padding:7px 18px;" onclick="openEdit('${t.id}')">✏️ Edit</button><div id="del-wrap"><button class="btn-d" onclick="showDel('${t.id}')">🗑️ Delete</button></div>`;
  document.getElementById('detail-comments').innerHTML=(t.comments||[]).map(c=>`<div class="cb">${av(c.author,26)}<div class="cb-body"><div style="font-size:11px;font-weight:700;color:#374151;">${c.author} <span style="font-weight:400;color:#9CA3AF;">${c.time}</span></div><div style="font-size:13px;color:#4B5563;margin-top:2px;">${c.text}</div></div></div>`).join('');
}
function showDel(id){
  document.getElementById('del-wrap').innerHTML=`<div style="display:flex;align-items:center;gap:8px;background:#FEF2F2;border-radius:10px;padding:8px 14px;"><span style="font-size:13px;color:#DC2626;font-weight:600;">Delete?</span><button onclick="delTask('${id}')" style="background:#DC2626;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;">Yes</button><button onclick="renderDetail(tasks.find(x=>x.id=='${id}'))" style="background:#F3F4F6;color:#374151;border:none;border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;">No</button></div>`;
}
async function delTask(id){ tasks=tasks.filter(t=>t.id!=id); closeModal('modal-detail'); render(); await deleteTaskDB(id); }
async function postComment(){
  const inp=document.getElementById('comment-input'),txt=inp.value.trim();if(!txt) return;
  const t=tasks.find(x=>x.id==selectedId);if(!t) return;
  t.comments=[...(t.comments||[]),{author:currentUser,text:txt,time:new Date().toISOString().slice(0,10)}];
  inp.value='';renderDetail(t);await upsertTask(t);
}

function openNew(){
  editingId=null;
  document.getElementById('task-modal-title').textContent='➕ New Task';
  document.getElementById('tf-title').value='';
  document.getElementById('tf-project').innerHTML=projects.map(p=>`<option>${p}</option>`).join('');
  document.getElementById('tf-status').value='To Do';
  document.getElementById('tf-priority').value='Medium';
  document.getElementById('tf-assignee').innerHTML=members.map(m=>`<option${m===currentUser?' selected':''}>${m}</option>`).join('');
  document.getElementById('tf-due').value='';
  document.getElementById('tf-desc').value='';
  openModal('modal-task');
}
function openEdit(id){
  const t=tasks.find(x=>x.id==id);if(!t) return;
  editingId=id;closeModal('modal-detail');
  document.getElementById('task-modal-title').textContent='✏️ Edit Task';
  document.getElementById('tf-title').value=t.title;
  document.getElementById('tf-project').innerHTML=projects.map(p=>`<option${p===t.project?' selected':''}>${p}</option>`).join('');
  document.getElementById('tf-status').value=t.status;document.getElementById('tf-priority').value=t.priority;
  document.getElementById('tf-assignee').innerHTML=members.map(m=>`<option${m===t.assignee?' selected':''}>${m}</option>`).join('');
  document.getElementById('tf-due').value=t.due||'';document.getElementById('tf-desc').value=t.description||'';
  openModal('modal-task');
}
async function submitTask(){
  if(isReadOnly) return;
  const title=document.getElementById('tf-title').value.trim();
  if(!title){alert('Please enter a task title.');return;}
  const td={id:editingId||Date.now().toString(),title,project:document.getElementById('tf-project').value,status:document.getElementById('tf-status').value,priority:document.getElementById('tf-priority').value,assignee:document.getElementById('tf-assignee').value,due:document.getElementById('tf-due').value||null,description:document.getElementById('tf-desc').value,comments:editingId?(tasks.find(t=>t.id==editingId)||{}).comments||[]:[],created_by:editingId?(tasks.find(t=>t.id==editingId)||{}).created_by||currentUser:currentUser};
  if(editingId){tasks=tasks.map(t=>t.id==editingId?td:t);}else{tasks.push(td);}
  const ps={};tasks.forEach(t=>{if(t.project) ps[t.project]=1;});projects=Object.keys(ps);
  closeModal('modal-task');render();await upsertTask(td);
}

function openMembers(){ pendingMembers=[...members];renderMembers();openModal('modal-members'); }
function renderMembers(){
  document.getElementById('members-list').innerHTML=pendingMembers.map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;background:#F9FAFB;border-radius:10px;padding:10px 14px;">${av(m,32)}<span style="flex:1;font-size:14px;font-weight:600;color:#111827;">${m}</span>${pendingMembers.length>1?`<button onclick="removePM(${i})" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;">Remove</button>`:''}</div>`).join('');
}
function addMemberInline(){ const n=document.getElementById('new-member-input').value.trim();if(!n||pendingMembers.includes(n)) return;pendingMembers.push(n);document.getElementById('new-member-input').value='';renderMembers(); }
function removePM(i){ pendingMembers.splice(i,1);renderMembers(); }
async function saveMembers(){
  const added=pendingMembers.filter(m=>!members.includes(m)),removed=members.filter(m=>!pendingMembers.includes(m));
  await Promise.all([...added.map(upsertMember),...removed.map(deleteMemberDB)]);
  members=[...pendingMembers];closeModal('modal-members');renderFilters();
}

function openProjects(){ pendingProjects=[...projects];renderProjects();openModal('modal-projects'); }
function renderProjects(){
  document.getElementById('projects-list').innerHTML=pendingProjects.map((p,i)=>{const cnt=tasks.filter(t=>t.project===p).length;return`<div style="display:flex;align-items:center;gap:10px;background:#F9FAFB;border-radius:10px;padding:10px 14px;"><div style="width:12px;height:12px;border-radius:3px;background:${PRC[i%PRC.length]};flex-shrink:0;"></div><span style="flex:1;font-size:14px;font-weight:600;color:#111827;">${p}</span>${cnt?`<span style="font-size:11px;color:#9CA3AF;background:#E5E7EB;border-radius:20px;padding:2px 8px;">${cnt} tasks</span>`:''}</div>`;}).join('');
}
function addProjectInline(){ const n=document.getElementById('new-project-input').value.trim();if(!n||pendingProjects.includes(n)) return;pendingProjects.push(n);document.getElementById('new-project-input').value='';renderProjects(); }
function saveProjects(){ projects=[...pendingProjects];closeModal('modal-projects');render(); }
</script>
</body>

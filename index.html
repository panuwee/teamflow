<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TeamFlow</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#EEF2FF 0%,#FDF4FF 50%,#FFF7ED 100%);min-height:100vh;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
#header{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05);gap:10px;flex-wrap:wrap;}
#logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:800;color:#111827;}
.view-btn{border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;background:#F3F4F6;color:#374151;}
.view-btn.active{background:#6366F1;color:#fff;}
#btn-new{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(99,102,241,.4);}
#sync-status{font-size:11px;color:#9CA3AF;display:flex;align-items:center;gap:4px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#9CA3AF;}
.dot.ok{background:#4ADE80;}.dot.syncing{background:#FB923C;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
#dashboard{display:grid;grid-template-columns:1fr auto;gap:16px;margin-bottom:20px;}
.dash-card{background:#fff;border-radius:16px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.stat-box{text-align:center;padding:4px 10px;}
.stat-num{font-size:20px;font-weight:800;}
.stat-label{font-size:10px;color:#9CA3AF;font-weight:600;white-space:nowrap;}
#filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
#filters select{border:1px solid #E5E7EB;border-radius:8px;padding:6px 12px;font-size:13px;color:#374151;background:#fff;}
#btn-clear{background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;display:none;}
#kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.col{border-radius:16px;padding:14px;min-height:200px;border:2px solid transparent;transition:background .15s,border .15s;}
.col.drag-over{border:2px dashed #818CF8!important;background:rgba(99,102,241,.06)!important;}
.col-header{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.col-title{font-weight:700;font-size:13px;}
.col-count{margin-left:auto;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;background:rgba(0,0,0,.07);}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);cursor:pointer;border-left:4px solid #ccc;transition:transform .15s,box-shadow .15s;user-select:none;}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.11);}
.card-title{font-size:13px;font-weight:600;color:#111827;line-height:1.4;}
.card-project{font-size:11px;color:#9CA3AF;margin-top:4px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.badge{border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;}
#list{display:flex;flex-direction:column;gap:16px;}
.list-group{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.list-header{padding:12px 20px;color:#fff;font-weight:700;font-size:14px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;font-size:11px;font-weight:700;color:#9CA3AF;text-align:left;border-bottom:1px solid #E5E7EB;background:#F9FAFB;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #F3F4F6;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F9FAFB;cursor:pointer;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h2{font-size:18px;font-weight:700;color:#111827;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:#6B7280;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:8px 12px;font-size:13px;color:#111827;}
.field textarea{resize:vertical;}
.btn-primary{background:#6366F1;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-secondary{background:#F3F4F6;color:#374151;border:none;border-radius:8px;padding:9px 20px;font-size:14px;cursor:pointer;}
.btn-danger{background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:7px 18px;font-size:13px;cursor:pointer;}
.comment-block{display:flex;gap:8px;margin-bottom:10px;}
.comment-body{background:#F9FAFB;border-radius:10px;padding:8px 12px;flex:1;}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
.spinner{width:40px;height:40px;border:4px solid #E5E7EB;border-top-color:#6366F1;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

</div>

<!-- Main App -->

  <div id="header">
    <div id="logo"><span>🎯</span> TeamFlow</div>
    <div style="display:flex;gap:6px;">

      <div id="online-avatars" style="display:flex;align-items:center;gap:4px;"></div>

<!-- Detail Modal -->

<!-- Task Form Modal -->
<div class="overlay" id="modal-task" onclick="if(event.target===this)closeModal('modal-task')">

    <h2 id="task-modal-title">➕ New Task</h2>

<!-- Members Modal -->

    </div>
  </div>
</div>

<!-- Projects Modal -->
<div class="overlay" id="modal-projects" onclick="if(event.target===this)closeModal('modal-projects')">
  <div class="modal">
    <h2>📁 Projects</h2>
    <div id="projects-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;"></div>
    <div style="display:flex;gap:8px;margin-bottom:20px;">

<script>

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function loginWithGoogle() {
  const {error} = await db.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://panuwee.github.io/teamflow/',
      queryParams: {hd: 'garena.com'}
    }
  });

async function logout() {
  if(!confirm('ต้องการ Logout ไหมครับ?')) return;
  if(presenceChannel) presenceChannel.unsubscribe();
  await db.auth.signOut();
  location.reload();
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = '❌ ' + msg;
  el.style.display = '';
}

function showLoginScreen() {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('screen-login');
  el.style.display = 'flex';   // ← override inline style โดยตรง แทน class
}

// ── SUPABASE DATA API ─────────────────────────────────────────────────────────
async function loadAll() {
  setSyncing(true);
  try {
    const [{data:td,error:te},{data:md,error:me}] = await Promise.all([
      db.from('tasks').select('*').order('updated_at',{ascending:true}),
      db.from('members').select('*').order('id',{ascending:true}),
    ]);
    if(te) throw te; if(me) throw me;
    tasks   = (td||[]).map(t=>({...t,comments:t.comments||[]}));
    members = (md||[]).map(m=>m.name);
    const ps={};
    tasks.forEach(t=>{if(t.project) ps[t.project]=1;});
    projects = Object.keys(ps);
    if(!projects.length) projects = ['Operation','Design'];
    setSyncing(false,'Synced');
  } catch(e) { setSyncing(false,'Error'); console.error(e); throw e; }
}

async function upsertTask(t) {
  setSyncing(true,'Saving…');
  const {error} = await db.from('tasks').upsert({
    id:t.id, title:t.title, project:t.project, status:t.status,
    priority:t.priority, assignee:t.assignee, due:t.due||null,
    description:t.description, comments:t.comments||[],
    created_by:t.created_by||null,
    updated_at:new Date().toISOString()
  });
  if(error){setSyncing(false,'Save failed');console.error(error);return;}
  setSyncing(false,'Saved ✓');
  setTimeout(()=>setSyncing(false,'Synced'),2000);
}

async function deleteTaskDB(id) {
  await db.from('tasks').delete().eq('id',id);
}
async function upsertMember(name) {
  await db.from('members').upsert({name},{onConflict:'name'});
}
async function deleteMemberDB(name) {
  await db.from('members').delete().eq('name',name);
}

setInterval(async()=>{
  if(document.hidden||!currentUser) return;
  await loadAll(); render();
},30000);

// ── PRESENCE ──────────────────────────────────────────────────────────────────
function initPresence() {
  if(presenceChannel) presenceChannel.unsubscribe();
  presenceChannel = db.channel('online-users',{config:{presence:{key:currentUser}}});
  presenceChannel
    .on('presence',{event:'sync'},()=>{
      const state=presenceChannel.presenceState();
      onlineUsers={};
      Object.keys(state).forEach(k=>{onlineUsers[k]=true;});
      renderOnlineAvatars();
    })
    .on('presence',{event:'join'},({key})=>{onlineUsers[key]=true;renderOnlineAvatars();})
    .on('presence',{event:'leave'},({key})=>{delete onlineUsers[key];renderOnlineAvatars();})
    .subscribe(async status=>{
      if(status==='SUBSCRIBED')
        await presenceChannel.track({user:currentUser,online_at:new Date().toISOString()});
    });
}

function renderOnlineAvatars() {
  const online=Object.keys(onlineUsers);
  document.getElementById('online-avatars').innerHTML=`
    <span style="font-size:11px;color:#9CA3AF;">🟢 ${online.length}</span>
    <div style="display:flex;">${online.map((u,i)=>`
      <div title="${u}" style="margin-left:${i>0?'-8px':'0'};z-index:${10-i};position:relative;">
        ${avatarHTML(u,28)}</div>`).join('')}
    </div>
    <span style="font-size:11px;color:#6366F1;font-weight:600;background:#EEF2FF;padding:3px 8px;border-radius:20px;">${currentUser}</span>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setSyncing(on,msg=''){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  dot.className='dot '+(on?'syncing':'ok');
  txt.textContent=msg||(on?'Syncing…':'Synced');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
function avatarHTML(name,size=28){
  const i=name?name.charCodeAt(0)%AVATAR_COLORS.length:0;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${AVATAR_COLORS[i]};font-size:${Math.round(size*.38)}px;">${name?name[0].toUpperCase():'?'}</div>`;
}
function progressRing(pct,color,size=44){
  const r=(size-6)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E5E7EB" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${d} ${c-d}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/><text x="${size/2}" y="${size/2+4}" text-anchor="middle" font-size="10" font-weight="700" fill="${color}">${pct}%</text></svg>`;
}
function filtered(){
  return tasks.filter(t=>
    (fAssignee==='All Assignees'||t.assignee===fAssignee)&&
    (fPriority==='All Priorities'||t.priority===fPriority)&&
    (fProject==='All Projects'||t.project===fProject));
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){renderDashboard();renderFilters();renderKanban();renderList();}

function renderDashboard(){
  const done=tasks.filter(t=>t.status==='Done').length,total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  const rings=projects.map((p,i)=>{
    const pt=tasks.filter(t=>t.project===p);
    const pp=pt.length?Math.round(pt.filter(t=>t.status==='Done').length/pt.length*100):0;
    return `<div style="display:flex;align-items:center;gap:8px;">${progressRing(pp,PROJ_COLORS[i%PROJ_COLORS.length],40)}<span style="font-size:12px;color:#6B7280;font-weight:600;">${p}</span></div>`;
  }).join('');
  document.getElementById('dash-progress').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;">${progressRing(pct,'#6366F1',52)}
    <div><div style="font-size:11px;color:#9CA3AF;font-weight:600;">OVERALL PROGRESS</div>
    <div style="font-size:16px;font-weight:800;color:#111827;">${done}/${total} Tasks Done</div></div></div>
    <div style="width:1px;height:40px;background:#E5E7EB;flex-shrink:0;"></div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;">${rings}</div>`;
  document.getElementById('dash-counts').innerHTML=STATUSES.map(s=>{
    const sc=STATUS_COLORS[s],cnt=tasks.filter(t=>t.status===s).length;
    return `<div class="stat-box"><div class="stat-num" style="color:${sc.text};">${cnt}</div><div class="stat-label">${s}</div></div>`;
  }).join('');
}

function renderFilters(){
  const fa=document.getElementById('f-assignee'),fp=document.getElementById('f-project');
  const va=fa.value,vp=fp.value;
  fa.innerHTML='<option>All Assignees</option>'+members.map(m=>`<option>${m}</option>`).join('');
  fp.innerHTML='<option>All Projects</option>'+projects.map(p=>`<option>${p}</option>`).join('');
  fa.value=va;fp.value=vp;
}

function applyFilter(){
  fAssignee=document.getElementById('f-assignee').value;
  fPriority=document.getElementById('f-priority').value;
  fProject =document.getElementById('f-project').value;
  const active=fAssignee!=='All Assignees'||fPriority!=='All Priorities'||fProject!=='All Projects';
  document.getElementById('btn-clear').style.display=active?'':'none';
  renderKanban();renderList();
}
function clearFilter(){
  fAssignee='All Assignees';fPriority='All Priorities';fProject='All Projects';
  document.getElementById('f-assignee').value='All Assignees';
  document.getElementById('f-priority').value='All Priorities';
  document.getElementById('f-project').value='All Projects';
  document.getElementById('btn-clear').style.display='none';
  renderKanban();renderList();
}

function cardHTML(t){
  const sc=STATUS_COLORS[t.status]||STATUS_COLORS['To Do'];
  const pc=PRIORITY_COLORS[t.priority]||PRIORITY_COLORS['Medium'];
  const today=new Date().toISOString().slice(0,10);
  const ov=t.due&&t.due<today&&t.status!=='Done';
  return `<div class="card" draggable="true" data-id="${t.id}" style="border-left-color:${sc.border};"
    ondragstart="draggingId='${t.id}'" onclick="openDetail('${t.id}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
      <span class="card-title">${t.title}</span>
      <span class="badge" style="background:${pc.bg};color:${pc.text};">${t.priority}</span>
    </div>
    <div class="card-project">${t.project}</div>
    <div class="card-footer">
      <div style="display:flex;align-items:center;gap:5px;">${avatarHTML(t.assignee,22)}<span style="font-size:11px;color:#6B7280;">${t.assignee}</span></div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${t.comments?.length?`<span style="font-size:11px;color:#9CA3AF;">💬${t.comments.length}</span>`:''}
        ${t.due?`<span style="font-size:11px;color:${ov?'#EF4444':'#9CA3AF'};font-weight:${ov?700:400};">${ov?'⚠️ ':'📅 '}${t.due}</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderKanban(){
  document.getElementById('kanban').innerHTML=STATUSES.map(status=>{
    const sc=STATUS_COLORS[status],col=filtered().filter(t=>t.status===status);
    return `<div class="col" style="background:${sc.bg};"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropCard('${status}',this)">
      <div class="col-header"><div class="col-dot" style="background:${sc.dot};"></div>
        <span class="col-title" style="color:${sc.text};">${status}</span>
        <span class="col-count" style="color:${sc.text};">${col.length}</span>
      </div>${col.map(cardHTML).join('')}</div>`;
  }).join('');
}

function renderList(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('list').innerHTML=projects.map((proj,pi)=>{
    const pt=filtered().filter(t=>t.project===proj);
    if(!pt.length) return '';
    return `<div class="list-group">
      <div class="list-header" style="background:linear-gradient(90deg,${PROJ_COLORS[pi%PROJ_COLORS.length]},${PROJ_COLORS[(pi+1)%PROJ_COLORS.length]});">
        ${proj} <span style="opacity:.8;font-size:12px;">${pt.length} task${pt.length!==1?'s':''}</span>
      </div>
      <table><thead><tr><th>TASK</th><th>STATUS</th><th>PRIORITY</th><th>ASSIGNEE</th><th>DUE</th><th>COMMENTS</th></tr></thead>
      <tbody>${pt.map(t=>{
        const sc=STATUS_COLORS[t.status]||STATUS_COLORS['To Do'];
        const pc=PRIORITY_COLORS[t.priority]||PRIORITY_COLORS['Medium'];
        const ov=t.due&&t.due<today&&t.status!=='Done';
        return `<tr onclick="openDetail('${t.id}')">
          <td style="font-weight:600;color:#111827;">${t.title}</td>
          <td><span class="badge" style="background:${sc.bg};color:${sc.text};">${t.status}</span></td>
          <td><span class="badge" style="background:${pc.bg};color:${pc.text};">${t.priority}</span></td>
          <td><div style="display:flex;align-items:center;gap:6px;">${avatarHTML(t.assignee,22)}<span>${t.assignee}</span></div></td>
          <td style="color:${ov?'#EF4444':'#9CA3AF'};font-weight:${ov?700:400};">${ov?'⚠️ ':''}${t.due||'—'}</td>
          <td style="color:#9CA3AF;">${t.comments?.length?'💬 '+t.comments.length:'—'}</td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  }).join('');
}

// ── VIEW ──────────────────────────────────────────────────────────────────────
function setView(v){
  view=v;
  document.getElementById('kanban').style.display=v==='kanban'?'grid':'none';
  document.getElementById('list').style.display=v==='list'?'flex':'none';
  document.getElementById('btn-kanban').className='view-btn'+(v==='kanban'?' active':'');
  document.getElementById('btn-list').className='view-btn'+(v==='list'?' active':'');
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
async function dropCard(status,col){
  col.classList.remove('drag-over');
  if(!draggingId) return;
  const t=tasks.find(x=>x.id==draggingId);
  if(t&&t.status!==status){t.status=status;render();await upsertTask(t);}
  draggingId=null;
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
function openDetail(id){
  selectedId=id;
  const t=tasks.find(x=>x.id==id);if(!t) return;
  renderDetailContent(t);openModal('modal-detail');
}
function renderDetailContent(t){
  const sc=STATUS_COLORS[t.status]||STATUS_COLORS['To Do'];
  const pc=PRIORITY_COLORS[t.priority]||PRIORITY_COLORS['Medium'];
  document.getElementById('detail-title-wrap').innerHTML=`<h2 style="margin:0;font-size:18px;font-weight:700;color:#111827;">${t.title}</h2>`;
  document.getElementById('detail-badges').innerHTML=`
    <span class="badge" style="background:${sc.bg};color:${sc.text};border:1px solid ${sc.border};">${t.status}</span>
    <span class="badge" style="background:${pc.bg};color:${pc.text};">${t.priority}</span>
    <span class="badge" style="background:#F3F4F6;color:#374151;">${t.project}</span>`;
  document.getElementById('detail-assignee').innerHTML=`<div style="display:flex;align-items:center;gap:6px;">${avatarHTML(t.assignee,24)}<span style="font-size:13px;color:#374151;">${t.assignee}</span></div>`;
  document.getElementById('detail-due').textContent=t.due||'—';
  document.getElementById('detail-pic').innerHTML=t.created_by
    ?`<div style="display:flex;align-items:center;gap:6px;">${avatarHTML(t.created_by,24)}<span style="font-size:13px;color:#374151;">${t.created_by}</span></div>`
    :`<span style="font-size:13px;color:#9CA3AF;">—</span>`;
  document.getElementById('detail-project').textContent=t.project||'—';
  document.getElementById('comment-header').textContent=`💬 Comments (${(t.comments||[]).length})`;
  document.getElementById('detail-actions').innerHTML=`
    <button class="btn-secondary" style="font-size:13px;padding:7px 18px;" onclick="openEdit('${t.id}')">✏️ Edit</button>
    <div id="del-wrap"><button class="btn-danger" onclick="showDelConfirm('${t.id}')">🗑️ Delete</button></div>`;
  document.getElementById('detail-comments').innerHTML=(t.comments||[]).map(c=>`
    <div class="comment-block">${avatarHTML(c.author,26)}
      <div class="comment-body">
        <div style="font-size:11px;font-weight:700;color:#374151;">${c.author} <span style="font-weight:400;color:#9CA3AF;">${c.time}</span></div>
        <div style="font-size:13px;color:#4B5563;margin-top:2px;">${c.text}</div>
      </div></div>`).join('');
}
function showDelConfirm(id){
  document.getElementById('del-wrap').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;background:#FEF2F2;border-radius:10px;padding:8px 14px;">
      <span style="font-size:13px;color:#DC2626;font-weight:600;">Delete this task?</span>
      <button onclick="deleteTask('${id}')" style="background:#DC2626;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;">Yes, delete</button>
      <button onclick="renderDetailContent(tasks.find(x=>x.id=='${id}'))" style="background:#F3F4F6;color:#374151;border:none;border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;">Cancel</button>
    </div>`;
}
async function deleteTask(id){
  tasks=tasks.filter(t=>t.id!=id);
  closeModal('modal-detail');render();
  await deleteTaskDB(id);
}
async function postComment(){
  const inp=document.getElementById('comment-input');
  const txt=inp.value.trim();if(!txt) return;
  const t=tasks.find(x=>x.id==selectedId);if(!t) return;
  t.comments=[...(t.comments||[]),{author:currentUser,text:txt,time:new Date().toISOString().slice(0,10)}];
  inp.value='';renderDetailContent(t);
  await upsertTask(t);
}

// ── TASK FORM ─────────────────────────────────────────────────────────────────
function openNew(){
  editingId=null;
  document.getElementById('task-modal-title').textContent='➕ New Task';
  document.getElementById('tf-title').value='';
  document.getElementById('tf-project').innerHTML=projects.map(p=>`<option>${p}</option>`).join('');
  document.getElementById('tf-status').value='To Do';
  document.getElementById('tf-priority').value='Medium';
  document.getElementById('tf-assignee').innerHTML=members.map(m=>`<option${m===currentUser?' selected':''}>${m}</option>`).join('');
  document.getElementById('tf-due').value='';
  document.getElementById('tf-desc').value='';
  openModal('modal-task');
}
function openEdit(id){
  const t=tasks.find(x=>x.id==id);if(!t) return;
  editingId=id;closeModal('modal-detail');
  document.getElementById('task-modal-title').textContent='✏️ Edit Task';
  document.getElementById('tf-title').value=t.title;
  document.getElementById('tf-project').innerHTML=projects.map(p=>`<option${p===t.project?' selected':''}>${p}</option>`).join('');
  document.getElementById('tf-status').value=t.status;
  document.getElementById('tf-priority').value=t.priority;
  document.getElementById('tf-assignee').innerHTML=members.map(m=>`<option${m===t.assignee?' selected':''}>${m}</option>`).join('');
  document.getElementById('tf-due').value=t.due||'';
  document.getElementById('tf-desc').value=t.description||'';
  openModal('modal-task');
}
async function submitTask(){
  const title=document.getElementById('tf-title').value.trim();
  if(!title){alert('Please enter a task title.');return;}
  const taskData={
    id:editingId||Date.now().toString(), title,
    project:document.getElementById('tf-project').value,
    status:document.getElementById('tf-status').value,
    priority:document.getElementById('tf-priority').value,
    assignee:document.getElementById('tf-assignee').value,
    due:document.getElementById('tf-due').value||null,
    description:document.getElementById('tf-desc').value,
    comments:editingId?(tasks.find(t=>t.id==editingId)||{}).comments||[]:[],
    created_by:editingId?(tasks.find(t=>t.id==editingId)||{}).created_by||currentUser:currentUser
  };
  if(editingId){tasks=tasks.map(t=>t.id==editingId?taskData:t);}
  else{tasks.push(taskData);}
  const ps={};tasks.forEach(t=>{if(t.project) ps[t.project]=1;});
  projects=Object.keys(ps);
  closeModal('modal-task');render();
  await upsertTask(taskData);
}

// ── MEMBERS ───────────────────────────────────────────────────────────────────
function openMembers(){
  pendingMembers=[...members];renderMembersList();openModal('modal-members');
}
function renderMembersList(){
  document.getElementById('members-list').innerHTML=pendingMembers.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:10px;background:#F9FAFB;border-radius:10px;padding:10px 14px;">
      ${avatarHTML(m,32)}<span style="flex:1;font-size:14px;font-weight:600;color:#111827;">${m}</span>
      ${pendingMembers.length>1?`<button onclick="removePendingMember(${i})" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600;">Remove</button>`:''}
    </div>`).join('');
}
function addMemberInline(){
  const n=document.getElementById('new-member-input').value.trim();
  if(!n||pendingMembers.includes(n)) return;
  pendingMembers.push(n);
  document.getElementById('new-member-input').value='';
  renderMembersList();
}
function removePendingMember(i){pendingMembers.splice(i,1);renderMembersList();}
async function saveMembers(){
  const added=pendingMembers.filter(m=>!members.includes(m));
  const removed=members.filter(m=>!pendingMembers.includes(m));
  await Promise.all([...added.map(upsertMember),...removed.map(deleteMemberDB)]);
  members=[...pendingMembers];
  closeModal('modal-members');renderFilters();
}

// ── PROJECTS ──────────────────────────────────────────────────────────────────
function openProjects(){
  pendingProjects=[...projects];renderProjectsList();openModal('modal-projects');
}
function renderProjectsList(){
  document.getElementById('projects-list').innerHTML=pendingProjects.map((p,i)=>{
    const cnt=tasks.filter(t=>t.project===p).length;
    return `<div style="display:flex;align-items:center;gap:10px;background:#F9FAFB;border-radius:10px;padding:10px 14px;">
      <div style="width:12px;height:12px;border-radius:3px;background:${PROJ_COLORS[i%PROJ_COLORS.length]};flex-shrink:0;"></div>
      <span style="flex:1;font-size:14px;font-weight:600;color:#111827;">${p}</span>
      ${cnt?`<span style="font-size:11px;color:#9CA3AF;background:#E5E7EB;border-radius:20px;padding:2px 8px;">${cnt} tasks</span>`:''}
      ${pendingProjects.length>1?`<button onclick="removeProject(${i})" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600;">${cnt?'⚠️ ':''}Remove</button>`:''}
    </div>`;
  }).join('');
}
function addProjectInline(){
  const n=document.getElementById('new-project-input').value.trim();
  if(!n||pendingProjects.includes(n)) return;
  pendingProjects.push(n);
  document.getElementById('new-project-input').value='';
  renderProjectsList();
}
function removeProject(i){
  const p=pendingProjects[i];
  const cnt=tasks.filter(t=>t.project===p).length;
  if(cnt&&!confirm(`"${p}" มี ${cnt} tasks อยู่ ถ้าลบ tasks เหล่านั้นจะยังอยู่\nต้องการลบต่อไหม?`)) return;
  pendingProjects.splice(i,1);renderProjectsList();
}
function saveProjects(){
  projects=[...pendingProjects];closeModal('modal-projects');render();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
// Safety timeout — ถ้าโหลดนานเกิน 8 วินาที ให้แสดงหน้า login แทน
setTimeout(()=>{
  if(document.getElementById('loading').style.display !== 'none'){
    console.warn('Boot timeout — forcing login screen');
    showLoginScreen();
  }
}, 8000);

(async()=>{
  document.getElementById('load-msg').textContent='Checking session…';
  try{
    // ดึง session ปัจจุบัน
    const {data:{session}} = await db.auth.getSession();

    if(!session){
      // ไม่ได้ login → แสดงหน้า Login
      showLoginScreen();
      return;
    }

    const email = session.user.email.toLowerCase();

    // เช็ค whitelist
    if(!WHITELIST[email]){
      await db.auth.signOut();
      showLoginScreen();
      showLoginError(`"${email}" ไม่มีสิทธิ์เข้าใช้งาน กรุณาติดต่อ Admin`);
      return;
    }

    // ได้รับอนุญาต → ดึงชื่อจาก whitelist
    currentUser = WHITELIST[email];

    // โหลดข้อมูล
    document.getElementById('load-msg').textContent='Loading tasks…';
    await loadAll();

    // เพิ่มเข้า Members อัตโนมัติถ้ายังไม่มี
    if(!members.includes(currentUser)){
      await upsertMember(currentUser);
      members.push(currentUser);
    }

    render();setView('kanban');
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='';
    initPresence();

  }catch(e){
    console.error('Boot error:', e);
    const dbg = document.getElementById('load-debug');
    dbg.style.display = '';
    dbg.textContent = 'Error: ' + e.message;
    // ถ้า error → แสดงหน้า login แทนค้างหน้าขาว
    setTimeout(()=>showLoginScreen(), 2000);
  }
})();
</script>
